meta.org.jkiss.dbeaver.ext.postgresql.tasks.PostgreToolMViewRefreshSettings.withData.description = Якщо вказано (або за замовчуванням) WITH DATA, виконується запит до бази даних для отримання нових даних, і матеріалізований погляд залишається в стані, придатному для сканування.\nЯкщо вказано WITH NO DATA, нові дані не генеруються, і матеріалізований погляд залишається в стані, придатному для сканування.
