connection_page_checkbox_legacy_encrypt_tip = All connections created using Exasol-provided 7.1 drivers will try to establish TLS connections to Exasol first, regardless of the database version.\nThis means using a 7.1 driver to connect to any database version requires you to take action to make a connection to the database, if you don't have properly configured certificates. You can copy fingerprint from the error message to the `fingerprint` driver property and reconnect or use legacy encryption (this option).\nIf the database does not fully support TLS (versions < 6.2.15 and < 7.0.10), then the driver will reconnect with ChaCha20.
